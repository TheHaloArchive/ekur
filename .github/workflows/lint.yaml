name: Python Lint/Check

on:
  push:
    branches: ["master"]
    paths:
      - "**.py"
  pull_request:
    branches: ["master"]
    paths:
      - "**.py"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./addon

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync Packages
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ty check
        run: uv run ty check
